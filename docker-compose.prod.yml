version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: server_admin_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: server_admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: server_admin_backend
    environment:
      POSTGRES_SERVER: db
      SERVER_ADMIN_FS_ROOT: /app/files
    volumes:
      # Mount the docker socket to allow managing host containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount CUPS socket to allow host printing from inside container
      - /var/run/cups/cups.sock:/var/run/cups/cups.sock
      # Mount persistent file storage directory
      - ./nissi_files:/app/files
      # Optional: Mount root filesystem read-only for host psutil monitoring
      - /:/hostfs:ro
    # For accurate psutil monitoring of the host:
    pid: "host"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: .
    container_name: server_admin_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
