version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: server_admin_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: server_admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: server_admin_backend
    environment:
      POSTGRES_SERVER: db
    volumes:
      # Mount the docker socket to allow managing host containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Optional: Mount root filesystem read-only for host psutil monitoring
      # (Note: psutil inside docker still might have some limitations without host networking/PID space)
      - /:/hostfs:ro
    # For accurate psutil monitoring of the host:
    pid: "host"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: .
    container_name: server_admin_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
