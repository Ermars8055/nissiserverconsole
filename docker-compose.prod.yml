version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: server_admin_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: server_admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  frontend:
    build:
      context: .
    container_name: server_admin_frontend
    network_mode: "host"
    restart: unless-stopped

volumes:
  postgres_data:
